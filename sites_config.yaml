# =============================================================================
# CONFIGURAÇÃO DOS SITES DE IMOBILIÁRIAS
# =============================================================================
# Seletores identificados a partir do HTML renderizado (debug_oliveira.html
# e debug_cirsa.html) enviado pelo usuário em 02/07/2026.
# =============================================================================

sites:
  oliveira:
    nome: "Oliveira Imóveis"
    logo: "https://www.oliveiraimoveis.net/assets/img/logo-original.png"
    base_url: "https://www.oliveiraimoveis.net"
    listagem_url: "https://www.oliveiraimoveis.net/aluguel"
    cidade_padrao: "Ipatinga"

    espera_seletor: ".container-card-busca"

    paginacao:
      tipo: "botao"              # clica em um botão "ver mais" repetidamente
      botao_selector: "#ver-mais"
      max_cliques: 15
      espera_apos_clique_ms: 1500

    seletores:
      card: ".container-card-busca"
      link: "a"                   # primeiro <a> dentro do card já tem o href correto
      titulo: "h2.card-title"     # ex: "Apartamento para alugar  no PARQUE CARAVELAS"
      preco: "h6.preco-imovel-card"
      endereco: "h4.card-text"    # rua/número, quando existir (nem sempre confiável)
      thumbnail: "img.img-imovel"
      thumbnail_attr: "data-src"

    # Extrai tipo e bairro do texto do título via regex nomeada.
    # Grupo "tipo" -> tipo do imóvel, grupo "bairro" -> bairro.
    titulo_regex: '^(?P<tipo>.+?)\s+para alugar\s+no\s+(?P<bairro>.+)$'

  cirsa:
    nome: "CIRSA Imóveis"
    logo: "https://www.cirsa.com.br/assets/img/logos/logo.png"
    base_url: "https://www.cirsa.com.br"
    listagem_url: "https://www.cirsa.com.br/aluguel/imoveis/todas-as-cidades/todos-os-bairros/0-quartos/0-suite-ou-mais/0-vaga/0-banheiro-ou-mais/todos-os-condominios?valorminimo=0&valormaximo=0&pagina={pagina}"
    cidade_padrao: "Ipatinga"

    espera_seletor: ".property"

    paginacao:
      tipo: "url"                 # incrementa {pagina} na listagem_url
      pagina_inicial: 1
      max_paginas: 20
      # se uma página não trouxer nenhum card novo, o scraper para sozinho

    seletores:
      card: ".property"
      link: "a"                   # primeiro <a> do card já tem o href do imóvel
      titulo: "h1.title"          # ex: "Apartamento | HORTO - Ipatinga"
      preco: ".property-price"
      thumbnail: ".property-img img"
      thumbnail_attr: "src"

    # Extrai tipo, bairro e cidade do título: "Tipo | Bairro - Cidade"
    titulo_regex: '^(?P<tipo>.+?)\s*\|\s*(?P<bairro>.+?)\s*-\s*(?P<cidade>.+)$'

  # ---------------------------------------------------------------------
  # NOVOS SITES (adicionados em 10/07/2026)
  # As URLs de listagem de aluguel já foram confirmadas. Os seletores
  # abaixo são PLACEHOLDERS — rode inspect_selectors.py para cada uma
  # das chaves abaixo e me mande o HTML gerado para eu preencher certo,
  # do mesmo jeito que fizemos com oliveira/cirsa.
  # ---------------------------------------------------------------------

  certa:
    nome: "Certa Imóveis"
    logo: "https://www.certaimoveis.com.br/storage/app/uploads/public/67b/a02/c79/67ba02c7922f3989662105.svg"
    base_url: "https://www.certaimoveis.com.br"
    listagem_url: "https://www.certaimoveis.com.br/imoveis/aluguel"
    cidade_padrao: "Ipatinga"
    espera_seletor: ".div_imovel"
    paginacao:
      tipo: "botao"
      botao_selector: "button.load_more"
      max_cliques: 15
      espera_apos_clique_ms: 1500
    seletores:
      card: ".div_imovel"
      link: "a.abrir_link"
      titulo: "p.tit"                # ex: "Casa para aluguel"
      preco: "p.value"                 # ex: "Valor: R$ 1.950,00"
      bairro: ".infos .address"        # ex: "Ideal - Ipatinga" (cuidado: existe outro
                                        # .address escondido no card, por isso o escopo ".infos")
      thumbnail: "figure img.image"
      thumbnail_attr: "src"
    # Extrai o tipo do início do título: "Casa para aluguel", "Apartamento para aluguel"...
    titulo_regex: '^(?P<tipo>.+?)\s+para\s+(?:aluguel|loca[çc][ãa]o)'
    # Extrai bairro e cidade do formato "Bairro - Cidade"
    endereco_regex: '^(?P<bairro>.+?)\s*-\s*(?P<cidade>.+)$'

  jfcorretor:
    nome: "JF Corretor Imobiliário"
    logo: "https://www.jfcorretor.com.br/img/logo-topo.png"
    base_url: "https://www.jfcorretor.com.br"
    listagem_url: "https://www.jfcorretor.com.br/imobiliaria/locacao/imoveis/8"
    cidade_padrao: "Ipatinga"
    espera_seletor: ".c49-property-card"
    paginacao:
      tipo: "nenhuma"   # essa busca fixa só retorna 10 imóveis, sem paginação
    seletores:
      card: ".c49-property-card"
      link: ".c49-property-card_photo a"
      titulo: ".c49-property-card_title"
      preco: ".c49-property-card_rent-price"
      bairro: ".c49-property-card_address"        # ex: "Bom Retiro, Ipatinga - MG"
      tipo: ".c49-property-card_type"              # ex: "Casa" (campo direto, sem precisar de regex)
      thumbnail: ".c49-property-card_photo img"
      thumbnail_attr: "src"
    # Extrai bairro e cidade do campo de endereço: "Bairro, Cidade - UF"
    endereco_regex: '^(?P<bairro>.+?),\s*(?P<cidade>.+?)\s*-\s*\w+$'

  realize:
    nome: "Imobiliária Realize"
    logo: "https://www.realizeipatinga.com.br/wp-content/uploads/2017/01/logositeazul200x100-2-1.png"
    base_url: "https://www.realizeipatinga.com.br"
    listagem_url: "https://www.realizeipatinga.com.br/status/aluguel/page/{pagina}/"
    cidade_padrao: "Ipatinga"
    espera_seletor: ".property-item"
    paginacao:
      tipo: "url"
      pagina_inicial: 1
      max_paginas: 20
    seletores:
      card: "article.property-item"
      link: "h4 a"
      titulo: "h4 a"                # ex: "Apartamento – Iguaçu"
      preco: "h5.price"              # ex: "R$ 4.500,00 /mês - Apartamento"
      thumbnail: "figure img"
      thumbnail_attr: "src"
    # Extrai tipo e bairro do título: "Tipo – Bairro" (aceita hífen ou travessão)
    titulo_regex: '^(?P<tipo>.+?)\s*[–-]\s*(?P<bairro>.+)$'

  correta:
    nome: "Correta Imóveis"
    logo: "PREENCHER_url_do_logo"
    base_url: "https://www.corretaimoveismg.com"
    listagem_url: "https://www.corretaimoveismg.com/imoveis/aluguel"
    cidade_padrao: "Ipatinga"
    espera_seletor: ".work"
    paginacao:
      tipo: "nenhuma"   # só 7 imóveis nessa página; existe paginação (/imoveis/aluguel/1)
                         # mas vamos deixar pra depois, quando validarmos o padrão de URL
    seletores:
      card: ".work"
      link: "a"
      preco: "h4"                     # ex: "R$ 1.250,00"
      bairro: "p:nth-of-type(1)"       # ex: "CIDADE NOBRE" (1º <p> do card)
      tipo: "p:nth-of-type(3)"         # ex: "Tipo: APARTAMENTO"
      thumbnail: "img"
      thumbnail_attr: "src"
    # Só usada para deixar o bairro com capitalização normal (Cidade Nobre
    # em vez de CIDADE NOBRE) — não tem cidade separada nesse card.
    endereco_regex: '^(?P<bairro>.+)$'

  allex:
    nome: "Allex Imóveis"
    logo: "https://d27dpdmjvijufl.cloudfront.net/fotos/logo/png/2992.png"
    base_url: "https://alleximoveis.com.br"
    listagem_url: "https://alleximoveis.com.br/busca/categoria/20382-destaques-de-locacao?operacao=locacao"
    cidade_padrao: "Ipatinga"
    espera_seletor: ".box-imovel-resultado"
    paginacao:
      tipo: "nenhuma"   # essa página mostra os destaques (~16); paginação completa fica para depois
    seletores:
      card: ".box-imovel-resultado"
      link: "a.imovel"
      titulo: ".titulo-imovel h3"      # ex: "APARTAMENTO PARA LOCAÇÃO NO JARDIM PANORAMA"
      preco: ".objeto-valor h5"         # texto "R$ 550,00" ou "Consultar"
      bairro: ".imagem .info .light"    # ex: "Jardim Panorama - Ipatinga"
      thumbnail: ".imagem img"
      thumbnail_attr: "src"
    # Extrai só o tipo do título (bairro/cidade vêm do campo de endereço)
    titulo_regex: '^(?P<tipo>.+?)\s+(?:PARA\s+LOCA[ÇC][AÃ]O|EM\s)'
    # Extrai bairro e cidade do campo de endereço: "Bairro - Cidade"
    endereco_regex: '^(?P<bairro>.+?)\s*-\s*(?P<cidade>.+)$'

  diferencial:
    nome: "Diferencial Imóveis"
    logo: "https://cdn.imoview.com.br/diferencial/Site/imagens/55j45wmo.png"
    base_url: "https://www.diferencialimoveis.com"
    listagem_url: "https://www.diferencialimoveis.com/aluguel"
    cidade_padrao: "Ipatinga"
    integracao: "imoview_api"
    api_url: "https://www.diferencialimoveis.com/retornar-imoveis-disponiveis"
    paginacao:
      tipo: "api"
      max_paginas: 20
    seletores: {}

  portal_imoveis:
    nome: "Portal Imóveis"
    logo: ""
    base_url: "https://portalimoveisimobiliaria.com.br"
    listagem_url: "https://portalimoveisimobiliaria.com.br/imoveis-locacao"
    cidade_padrao: "Ipatinga"
    paginacao:
      tipo: "nenhuma"
    seletores: {}

  moradia:
    nome: "Moradia Imobiliária"
    logo: ""
    base_url: "https://moradiaimobiliaria.com.br"
    listagem_url: "https://moradiaimobiliaria.com.br/imoveis/?sortby=most_viewed&status=aluguel"
    cidade_padrao: "Ipatinga"
    paginacao:
      tipo: "nenhuma"
    seletores: {}

# =============================================================================
# CONFIGURAÇÃO DE AGENDAMENTO
# =============================================================================
agendamento:
  intervalo_horas: 6        # roda a cada 6 horas
  horario_fixo: "09:10"     # roda todo dia às 9:10 (formato HH:MM)

# =============================================================================
# GEOCODIFICAÇÃO (bairro -> latitude/longitude)
# =============================================================================
geocodificacao:
  provedor: "nominatim"
  user_agent: "imoveis-scraper-app (uso pessoal)"
  pais: "Brasil"
